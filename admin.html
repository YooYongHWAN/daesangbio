<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민원 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --accent2: #f5a623;
    --surface: #16213e;
    --text: #eaeaea;
    --muted: #8892a4;
    --border: rgba(255,255,255,0.08);
    --success: #2ecc71;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--primary);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  .header {
    background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 60%, #16213e 100%);
    padding: 24px 20px;
    border-bottom: 2px solid var(--accent2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header h1 { font-size: 20px; font-weight: 900; }
  .header h1 span { color: var(--accent2); }
  .header .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .btn-refresh, .btn-logout {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-logout { color: var(--muted); }

  /* 로그인 */
  #loginScreen {
    max-width: 380px;
    margin: 80px auto;
    padding: 0 20px;
    text-align: center;
  }
  .login-icon { font-size: 48px; margin-bottom: 16px; }
  .login-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
  .login-desc { font-size: 13px; color: var(--muted); margin-bottom: 30px; }
  input[type="password"], input[type="text"], select {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    outline: none;
  }
  input:focus { border-color: var(--accent2); }
  .btn-login {
    width: 100%;
    margin-top: 12px;
    background: linear-gradient(135deg, var(--accent2), #e67e22);
    border: none; color: #1a1a2e;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(245,166,35,0.3);
  }
  .login-error { color: var(--accent); font-size: 12px; margin-top: 12px; display: none; }

  /* 대시보드 */
  #dashboard { display: none; }
  .container { max-width: 800px; margin: 0 auto; padding: 20px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  @media (max-width: 500px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 14px;
  }
  .stat-num { font-family: 'Bebas Neue', cursive; font-size: 32px; letter-spacing: 1px; }
  .stat-label { font-size: 11px; color: var(--muted); font-weight: 600; }
  .stat-card.c-total .stat-num { color: var(--text); }
  .stat-card.c-new .stat-num { color: var(--accent); }
  .stat-card.c-progress .stat-num { color: var(--accent2); }
  .stat-card.c-done .stat-num { color: var(--success); }

  /* 유형별 통계 바 */
  .type-stats {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .type-stats-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 1px; margin-bottom: 12px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-label { font-size: 12px; width: 80px; flex-shrink: 0; font-weight: 500; }
  .bar-track { flex: 1; height: 18px; background: rgba(255,255,255,0.05); border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 6px; transition: width 0.6s ease; min-width: 2px; }
  .bar-count { font-size: 12px; font-weight: 700; width: 36px; text-align: right; flex-shrink: 0; }

  /* 필터 */
  .filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .chip {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
  }
  .chip.active { border-color: var(--accent2); color: var(--accent2); background: rgba(245,166,35,0.1); }
  .search-box { margin-bottom: 16px; }

  /* 민원 카드 */
  .ticket {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .ticket-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px; }
  .ticket-receipt { font-family: 'Bebas Neue', cursive; font-size: 18px; letter-spacing: 1px; color: var(--muted); }
  .ticket-title { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .status-badge {
    font-size: 11px; font-weight: 700;
    padding: 5px 12px; border-radius: 20px;
    flex-shrink: 0; cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .status-접수 { background: rgba(233,69,96,0.15); color: var(--accent); border-color: var(--accent); }
  .status-진행중 { background: rgba(245,166,35,0.15); color: var(--accent2); border-color: var(--accent2); }
  .status-완료 { background: rgba(46,204,113,0.15); color: var(--success); border-color: var(--success); }
  .ticket-meta { font-size: 12px; color: var(--muted); line-height: 1.7; }
  .ticket-meta b { color: var(--text); font-weight: 500; }
  .ticket-detail {
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.6;
    margin-top: 8px;
    color: var(--text);
  }
  .ticket-photo {
    display: inline-block;
    margin-top: 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent2);
    text-decoration: none;
  }
  .status-hint { font-size: 10px; color: var(--muted); text-align: right; margin-top: 8px; }

  .empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 13px; }
  .loading { text-align: center; color: var(--muted); padding: 40px; font-size: 13px; }

  .toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--success);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    transition: transform 0.3s ease;
    z-index: 100;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginScreen">
  <div class="login-icon">🔐</div>
  <div class="login-title">민원 관리자</div>
  <div class="login-desc">관리자 비밀번호를 입력하세요</div>
  <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()" />
  <button class="btn-login" onclick="doLogin()">로그인</button>
  <div class="login-error" id="loginError">❌ 비밀번호가 올바르지 않습니다</div>
</div>

<!-- 대시보드 -->
<div id="dashboard">
  <div class="header">
    <div>
      <h1>시설물 <span>민원관리</span></h1>
      <div class="sub" id="lastUpdate"></div>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn-refresh" onclick="loadData()">🔄 새로고침</button>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="container">
    <!-- 통계 카드 -->
    <div class="stats-grid">
      <div class="stat-card c-total"><div class="stat-num" id="statTotal">0</div><div class="stat-label">전체 접수</div></div>
      <div class="stat-card c-new"><div class="stat-num" id="statNew">0</div><div class="stat-label">🔴 접수</div></div>
      <div class="stat-card c-progress"><div class="stat-num" id="statProgress">0</div><div class="stat-label">🟡 진행중</div></div>
      <div class="stat-card c-done"><div class="stat-num" id="statDone">0</div><div class="stat-label">🟢 완료</div></div>
    </div>

    <!-- 유형별 통계 -->
    <div class="type-stats">
      <div class="type-stats-title">📊 이번 달 유형별 접수</div>
      <div id="typeBars"></div>
    </div>

    <!-- 필터 -->
    <div class="filter-row" id="statusFilter">
      <div class="chip active" data-f="전체" onclick="setFilter(this)">전체</div>
      <div class="chip" data-f="접수" onclick="setFilter(this)">🔴 접수</div>
      <div class="chip" data-f="진행중" onclick="setFilter(this)">🟡 진행중</div>
      <div class="chip" data-f="완료" onclick="setFilter(this)">🟢 완료</div>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 접수번호, 위치, 문제 검색..." oninput="render()" />
    </div>

    <!-- 민원 목록 -->
    <div id="ticketList"><div class="loading">데이터 로딩 중...</div></div>
  </div>
</div>

<div class="toast" id="toast">상태가 변경되었습니다</div>

<script>
  /* ═══════════════════════════════════════════
     ★ 설정: Apps Script 웹앱 배포 URL (index.html과 동일)
     ═══════════════════════════════════════════ */
  const API_URL = "https://script.google.com/macros/s/AKfycbzrT6NAdr25QFIQunoPyxxWFFAn8jtAhFXDpx886e5KY-RS4EVOZW7vBjgQoHG9K1OoUg/exec";

  let token = sessionStorage.getItem('admin_token') || '';
  let allRows = [];
  let currentFilter = '전체';

  const STATUS_CYCLE = { '접수': '진행중', '진행중': '완료', '완료': '접수' };

  // 세션에 토큰이 있으면 자동 로그인
  if (token) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  }

  async function doLogin() {
    const pw = document.getElementById('pwInput').value;
    if (!pw) return;
    document.getElementById('loginError').style.display = 'none';

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "login", password: pw })
      });
      const data = await res.json();

      if (data.result === 'success') {
        token = data.token;
        sessionStorage.setItem('admin_token', token);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadData();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    } catch (e) {
      alert('서버 연결 실패. API_URL 설정을 확인해주세요.');
    }
  }

  function logout() {
    sessionStorage.removeItem('admin_token');
    location.reload();
  }

  async function loadData() {
    document.getElementById('ticketList').innerHTML = '<div class="loading">데이터 로딩 중...</div>';
    try {
      const res = await fetch(API_URL + '?action=list&token=' + encodeURIComponent(token));
      const data = await res.json();

      if (data.result === 'unauthorized') { logout(); return; }

      allRows = data.rows || [];
      document.getElementById('lastUpdate').textContent = '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
      updateStats();
      render();
    } catch (e) {
      document.getElementById('ticketList').innerHTML = '<div class="empty">⚠️ 데이터를 불러올 수 없습니다.<br>API_URL 설정과 배포 상태를 확인해주세요.</div>';
    }
  }

  function updateStats() {
    const total = allRows.length;
    const cnt = { '접수': 0, '진행중': 0, '완료': 0 };
    allRows.forEach(r => { if (cnt[r.status] !== undefined) cnt[r.status]++; });

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statNew').textContent = cnt['접수'];
    document.getElementById('statProgress').textContent = cnt['진행중'];
    document.getElementById('statDone').textContent = cnt['완료'];

    // 이번 달 유형별 통계
    const now = new Date();
    const thisMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
    const typeCnt = {};
    allRows.forEach(r => {
      if (r.time && r.time.startsWith(thisMonth)) {
        typeCnt[r.type] = (typeCnt[r.type] || 0) + 1;
      }
    });

    const entries = Object.entries(typeCnt).sort((a, b) => b[1] - a[1]);
    const max = entries.length ? entries[0][1] : 1;
    document.getElementById('typeBars').innerHTML = entries.length
      ? entries.map(([t, c]) =>
          `<div class="bar-row">
            <div class="bar-label">${t}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(c / max * 100)}%"></div></div>
            <div class="bar-count">${c}건</div>
          </div>`).join('')
      : '<div style="font-size:12px;color:var(--muted)">이번 달 접수 내역이 없습니다</div>';
  }

  function setFilter(el) {
    document.querySelectorAll('#statusFilter .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentFilter = el.dataset.f;
    render();
  }

  function render() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let rows = allRows;

    if (currentFilter !== '전체') rows = rows.filter(r => r.status === currentFilter);
    if (q) rows = rows.filter(r =>
      (r.receipt + r.type + r.location + r.problem + r.detail).toLowerCase().includes(q)
    );

    const list = document.getElementById('ticketList');
    if (!rows.length) {
      list.innerHTML = '<div class="empty">📭 해당하는 민원이 없습니다</div>';
      return;
    }

    list.innerHTML = rows.map(r => `
      <div class="ticket">
        <div class="ticket-head">
          <div>
            <div class="ticket-receipt">#${esc(r.receipt)}</div>
            <div class="ticket-title">${esc(r.type)} · ${esc(r.location)}${r.floor ? ' ' + esc(r.floor) : ''}${r.stall ? ' ' + esc(r.stall) : ''}</div>
          </div>
          <div class="status-badge status-${r.status}" onclick="cycleStatus('${esc(r.receipt)}', '${r.status}')">${statusIcon(r.status)} ${r.status}</div>
        </div>
        <div class="ticket-meta">
          <b>문제:</b> ${esc(r.problem)}<br>
          <b>접수:</b> ${esc(r.time)} · ${esc(r.anonymous)}${r.contact ? ' · ' + esc(r.contact) : ''}
          ${r.doneDate ? '<br><b>처리일:</b> ' + esc(r.doneDate) : ''}
        </div>
        ${r.detail ? `<div class="ticket-detail">💬 ${esc(r.detail)}</div>` : ''}
        ${r.photo && r.photo !== '저장실패' ? `<a class="ticket-photo" href="${esc(r.photo)}" target="_blank">📷 첨부 사진 보기 →</a>` : ''}
        <div class="status-hint">상태 배지를 누르면 접수 → 진행중 → 완료 순으로 변경됩니다</div>
      </div>
    `).join('');
  }

  function statusIcon(s) { return s === '접수' ? '🔴' : s === '진행중' ? '🟡' : '🟢'; }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function cycleStatus(receipt, current) {
    const next = STATUS_CYCLE[current] || '접수';

    // UI 먼저 반영 (낙관적 업데이트)
    const row = allRows.find(r => r.receipt === receipt);
    if (row) row.status = next;
    updateStats();
    render();

    try {
      await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "updateStatus", token: token, receipt: receipt, status: next })
      });
      showToast(`#${receipt} → ${statusIcon(next)} ${next}`);
    } catch (e) {
      showToast('⚠️ 저장 실패 - 새로고침 후 다시 시도');
    }
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
